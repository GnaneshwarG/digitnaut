name: Update Digitnaut Sitemap

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run sitemap script
        run: python sitemap.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Gnaneshwar Gaddam'
          git config --global user.email 'gnaneshwargaddam@gmail.com'
          git add .
          git commit -m "Automated update for sitemap and index" || exit 0
          git push
